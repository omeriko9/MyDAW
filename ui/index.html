<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyDAW</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" sizes="any" href="/favicon.ico" />
    <!-- Theme background before any CSS/JS loads, to avoid a flash. The saved theme
         (lib/prefs "mydaw.ui.theme") is stamped as data-theme pre-paint; the inline
         style mirrors theme.css --bg/--text for both values. -->
    <script>
      (function () {
        var ok = { dark: 1, light: 1, slate: 1, sepia: 1, prism: 1 };
        var t = "dark";
        try {
          var saved = JSON.parse(localStorage.getItem("mydaw.ui.theme"));
          if (ok[saved]) t = saved;
        } catch (e) {}
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #16171c;
        color: #e6e8ee;
      }
      html[data-theme="light"],
      html[data-theme="light"] body {
        background: #f2f3f7;
        color: #2a2d38;
      }
      html[data-theme="slate"],
      html[data-theme="slate"] body {
        background: #363b47;
        color: #eef1f7;
      }
      html[data-theme="sepia"],
      html[data-theme="sepia"] body {
        background: #ddd0b8;
        color: #33291d;
      }
      html[data-theme="prism"],
      html[data-theme="prism"] body {
        background: #f1f2f7;
        color: #24262f;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
