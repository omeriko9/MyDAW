<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyDAW</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" sizes="any" href="/favicon.ico" />
    <!-- Theme background before any CSS/JS loads, to avoid a flash. The saved theme
         (lib/prefs "mydaw.ui.theme") is stamped as data-theme pre-paint; the inline
         style mirrors theme.css --bg/--text for both values. -->
    <script>
      (function () {
        var t = "dark";
        try {
          if (JSON.parse(localStorage.getItem("mydaw.ui.theme")) === "light") t = "light";
        } catch (e) {}
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #16171c;
        color: #e6e8ee;
      }
      html[data-theme="light"],
      html[data-theme="light"] body {
        background: #f2f3f7;
        color: #2a2d38;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
